      { name: "콜라블롭", emoji: "🥤", color: "#9b5b37", special: "coinWave", ranges: [[1,5],[5,10],[10,15],[15,20],[20,25]], integer: true },
      { name: "사이다블롭", emoji: "🧃", color: "#a8f3ff", special: "luckStone", ranges: [[1,2],[2,4],[4,6],[6,8],[8,10]] },
      { name: "초사이언블롭", emoji: "⚡", color: "#fff04a", special: "startCoin", ranges: [[1,20],[20,30],[40,60],[60,80],[80,100]], integer: true },
      { name: "마미손블롭", emoji: "🧤", color: "#ff5c9a", special: "moveSpeed", ranges: [[1,5],[5,10],[10,15],[15,20],[20,25]], integer: true },
      { name: "할로인블롭", emoji: "🎃", color: "#ff8b2f", effect: "마나회복속도 증가", unit: "", ranges: [[0.1,4],[4,8],[8,12],[12,16],[16,20]] },
      { name: "고기블롭", emoji: "🍖", color: "#ff7047", effect: "궁극기 쿨타임 감소 효과 증가", unit: "%", ranges: [[0.1,2],[2,4],[4,6],[6,8],[8,10]] },
      { name: "V3블롭", emoji: "🧬", color: "#63e6be", effect: "최대 보유 가능한 영웅 수 증가", unit: "", ranges: [[0.1,1],[1,2],[2,3],[3,4],[4,5]] },
      { name: "가면블롭", emoji: "🎭", color: "#f2f2f2", effect: "단일 피해 증가", unit: "%", ranges: [[0.1,3],[3,6],[6,9],[9,12],[12,15]] },
      { name: "짜부블롭", emoji: "🟣", color: "#bd8cff", effect: "범위 피해 증가", unit: "%", ranges: [[0.1,3],[3,6],[6,9],[9,12],[12,15]] },
      { name: "외눈블롭", emoji: "👁️", color: "#65e451", special: "oneEye", ranges: [[0.01,0.1],[0.1,0.2],[0.2,0.3],[0.3,0.4],[0.4,0.5]] },
      { name: "비만블롭", emoji: "🥞", color: "#ffd166", special: "fat", ranges: [[0.01,0.2],[0.2,0.4],[0.4,0.6],[0.6,0.8],[0.8,1]] },
      { name: "산타블롭", emoji: "🎅", color: "#ff5858", special: "santa", ranges: [[5,40],[40,80],[80,120],[120,160],[160,200]], integer: true },
    ];

    let slots = [];
    let gauge = 0;
    let usedKeys = 0;
    let drawCount = 0;
    let guaranteedCount = 0;
    let gradeStats = { 일반: 0, 희귀: 0, 영웅: 0, 전설: 0, 신화: 0 };
    let logs = [];

    const $ = (id) => document.getElementById(id);

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sample(arr) {
      return arr[randomInt(0, arr.length - 1)];
    }

    function escapeHtml(text) {
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // 등급 확률은 정수 1~100으로 정확히 처리합니다.
    // 1~35 일반, 36~65 희귀, 66~90 영웅, 91~99 전설, 100 신화
    function rollGrade() {
      const r = randomInt(1, 100);
      if (r <= 35) return "일반";
      if (r <= 65) return "희귀";
      if (r <= 90) return "영웅";
      if (r <= 99) return "전설";
      return "신화";
    }

    // 등급 내 퍼센트는 1~100 정수, 각 1% 동일 확률입니다.
    function rollQualityPercent() {
      return randomInt(1, 100);
    }

    // 예: 워터블롭 전설 40% = 9 + (12 - 9) * 0.40 = 10.2
    function calcValue(range, qualityPercent) {
      const [min, max] = range;
      return min + (max - min) * (qualityPercent / 100);
    }

    function formatNumber(num, integer = false) {
      if (integer) return String(Math.floor(num));
      return String(Number(num.toFixed(2)));
    }

    function imagePath(figure) {
      const index = figures.indexOf(figure);
      if (index === -1) return `images/${figure.name}.png`;
      return `images/${index + 1}.png`;
    }

    function figureVisual(figure) {
      const safeName = escapeHtml(figure.name);
      return `<img src="${imagePath(figure)}" alt="${safeName}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><span class="fallback-emoji">${figure.emoji}</span>`;
    }

    function buildEffect(slot) {
      const fig = slot.figure;
      const gradeIndex = grades.indexOf(slot.grade);
      const percent = slot.percent;
      const value = calcValue(fig.ranges[gradeIndex], percent);

      if (fig.special === "burger") {
        const chance = formatNumber(value);
        const extra = formatNumber(calcValue(fig.extraRanges[gradeIndex], percent));
        return `처치 시 <span class="value-highlight">${chance}%</span> 확률로 코인 증가 / 추가 증가량 <span class="value-highlight">${extra}</span>`;
      }
      if (fig.special === "coinWave") return `웨이브마다 <span class="value-highlight">${formatNumber(value, true)} 코인</span> 지급`;
      if (fig.special === "luckStone") return `웨이브마다 <span class="value-highlight">${formatNumber(value)}%</span> 확률로 행운석 1개 지급`;
      if (fig.special === "startCoin") return `시작 코인 <span class="value-highlight">${formatNumber(value, true)}</span> 증가`;
      if (fig.special === "moveSpeed") return `이동속도 <span class="value-highlight">${formatNumber(value, true)}</span> 증가`;
      if (fig.special === "oneEye") return `현재 보유 영웅 수 × <span class="value-highlight">${formatNumber(value)}%</span> 만큼 피해 증가`;
      if (fig.special === "fat") return `영웅 합성 시 <span class="value-highlight">${formatNumber(value)}%</span> 확률로 등급업`;
      if (fig.special === "santa") return `골렘 처치 시 <span class="value-highlight">${formatNumber(value, true)} 코인</span> 지급`;

      const base = fig.effect.endsWith(" 증가") ? fig.effect.slice(0, -3) : fig.effect;
      return `${base} <span class="value-highlight">${formatNumber(value)}${fig.unit || ""}</span> 증가`;
    }

    function createSlot(figure, forcedGrade = null) {
      return {
        figure,
        grade: forcedGrade || rollGrade(),
        percent: rollQualityPercent(),
        locked: false,
      };
    }

    function getLockCount() {
      return slots.filter(s => !s.empty && s.locked).length;
    }

    function getCost() {
      return keyCostByLock[getLockCount()] || 5;
    }

    function createEmptySlots() {
      slots = Array.from({ length: 5 }, () => ({ empty: true, locked: false }));
    }

    function toggleLock(index) {
      if (!slots[index] || slots[index].empty) {
        addLog("빈 슬롯은 잠글 수 없습니다. 먼저 뽑기를 진행하세요.");
        render();
        return;
      }
      if (!slots[index].locked && getLockCount() >= 3) {
        addLog("최대 3개까지만 잠금 가능합니다.");
        render();
        return;
      }
      slots[index].locked = !slots[index].locked;
      render();
    }

    function applyGaugeInput() {
      gauge = Math.max(0, Math.floor(Number($("gaugeInput").value || 0)));
    }

    function pickFigureUniform(pool) {
      const fig = sample(pool);
      pool.splice(pool.indexOf(fig), 1);
      return fig;
    }

    function drawOnce(renderAfter = true, syncGaugeInput = true) {
      if (syncGaugeInput) applyGaugeInput();
      const cost = getCost();
      const isGuaranteed = gauge >= 500;
      const unlockedIndexes = slots.map((s, i) => (!s.empty && s.locked) ? null : i).filter(i => i !== null);
      const lockedNames = new Set(slots.filter(s => !s.empty && s.locked).map(s => s.figure.name));
      const pool = figures.filter(f => !lockedNames.has(f.name));
      const changed = [];

      let guaranteedSlotIndex = null;
      let guaranteedFigure = null;

      if (isGuaranteed && unlockedIndexes.length > 0) {
        // 확정 신화 슬롯과 피규어를 먼저 동일 확률로 뽑습니다.
        guaranteedSlotIndex = sample(unlockedIndexes);
        guaranteedFigure = pickFigureUniform(pool);
      }

      for (const idx of unlockedIndexes) {
        let fig;
        let grade;
        if (idx === guaranteedSlotIndex) {
          fig = guaranteedFigure;
          grade = "신화";
        } else {
          fig = pickFigureUniform(pool);
          grade = rollGrade();
        }
        const newSlot = createSlot(fig, grade);
        slots[idx] = newSlot;
        gradeStats[grade] += 1;
        changed.push(`${fig.name} ${grade}(${newSlot.percent}%)`);
      }

      usedKeys += cost;
      drawCount += 1;
      gauge += cost;
      if (isGuaranteed) {
        gauge -= 500;
        guaranteedCount += 1;
      }

      addLog(`${drawCount}회차 · 🔑${cost} 사용 · ${isGuaranteed ? "<b>신화 확정</b> · " : ""}${changed.join(", ")}`);
      if (renderAfter) render();
    }

    function addLog(text) {
      logs.unshift(text);
      if (logs.length > 20) logs.pop();
    }

    function resetAll() {
      gauge = 0;
      usedKeys = 0;
      drawCount = 0;
      guaranteedCount = 0;
      gradeStats = { 일반: 0, 희귀: 0, 영웅: 0, 전설: 0, 신화: 0 };
      logs = [];
      createEmptySlots();
      render();
    }

    function renderStage() {
      $("slotStage").innerHTML = slots.map((slot, i) => {
        if (slot.empty) {
          return `
            <div class="slot-stand empty" data-index="${i}" onclick="toggleLock(${i})" title="빈 슬롯">
              <div class="figure-icon empty-figure">?</div>
              <div class="pedestal"></div>
            </div>
          `;
        }
        return `
          <div class="slot-stand ${gradeClass[slot.grade]} ${slot.locked ? "locked" : ""}" data-index="${i}" onclick="toggleLock(${i})" title="${escapeHtml(slot.figure.name)} ${slot.grade} (${slot.percent}%)">
            <div class="figure-icon">${figureVisual(slot.figure)}</div>
            <div class="pedestal"></div>
          </div>
        `;
      }).join("");
    }

    function renderCards() {
      $("resultCards").innerHTML = slots.map((slot, i) => {
        if (slot.empty) {
          return `
            <div class="card empty">
              <div class="mini-icon">?</div>
              <div>
                <div class="card-title">빈 슬롯</div>
                <div class="effect-line">뽑기를 누르면 피규어가 등장합니다.</div>
              </div>
              <button class="lock-btn" onclick="toggleLock(${i}); event.stopPropagation();">🔓</button>
            </div>
          `;
        }
        const cls = gradeClass[slot.grade];
        return `
          <div class="card ${cls} ${slot.locked ? "locked" : ""}">
            <div class="mini-icon">${figureVisual(slot.figure)}</div>
            <div>
              <div class="card-title">${slot.figure.name} <span class="grade-name">${slot.grade}</span> <span class="grade-percent">(${slot.percent}%)</span></div>
              <div class="effect-line">${buildEffect(slot)}</div>
            </div>
            <button class="lock-btn" onclick="toggleLock(${i}); event.stopPropagation();">${slot.locked ? "🔒" : "🔓"}</button>
          </div>
        `;
      }).join("");
    }

    function render() {
      const cost = getCost();
      const lockCount = getLockCount();
      const totalFigures = grades.reduce((sum, grade) => sum + gradeStats[grade], 0);
      const naturalMythics = Math.max(0, gradeStats["신화"] - guaranteedCount);
      const legendPlus = gradeStats["전설"] + gradeStats["신화"];
      const mythicRate = totalFigures ? `${Number(((gradeStats["신화"] / totalFigures) * 100).toFixed(2))}%` : "0%";
      $("gaugeInput").value = gauge;
      $("usedKeysTop").textContent = usedKeys;
      $("usedKeysStat").textContent = usedKeys;
      $("totalFigureCount").textContent = totalFigures;
      $("lockCount").textContent = lockCount;
      $("nextCost").textContent = cost;
      $("drawCost").textContent = cost;
      $("drawCount").textContent = drawCount;
      $("normalCount").textContent = gradeStats["일반"];
      $("rareCount").textContent = gradeStats["희귀"];
      $("mythicCount").textContent = gradeStats["신화"];
      $("legendCount").textContent = gradeStats["전설"];
      $("heroCount").textContent = gradeStats["영웅"];
      $("guaranteedCount").textContent = guaranteedCount;
      $("naturalMythicCount").textContent = naturalMythics;
      $("legendPlusCount").textContent = legendPlus;
      $("mythicRate").textContent = mythicRate;
      $("pityText").textContent = `${gauge}/500`;
      $("pityText").className = gauge >= 500 ? "pity-count pity-ready" : "pity-count";
      $("log").innerHTML = logs.length ? logs.map(l => `<div>${l}</div>`).join("") : "아직 뽑기 기록이 없습니다.";
      renderStage();
      renderCards();
    }

    $("drawBtn").addEventListener("click", () => drawOnce(true));
    $("resetBtn").addEventListener("click", resetAll);
    $("gaugeInput").addEventListener("change", () => { applyGaugeInput(); render(); });
    $("helpBtn").addEventListener("click", () => {
      alert("확률 규칙\n- 피규어 30종은 동일 확률로 등장\n- 5칸은 중복 없이 등장\n- 등급 확률: 일반 35%, 희귀 30%, 영웅 25%, 전설 9%, 신화 1%\n- 등급 내 퍼센트: 1~100%, 각 값 동일 확률\n- 수치 계산: 최소값 + (최대값 - 최소값) × 등급퍼센트 / 100\n\n예시\n워터블롭 전설 40% = 9 + (12 - 9) × 0.4 = 10.2%\n산타블롭 신화 18% = 160 + (200 - 160) × 0.18 = 167.2 → 167 코인");
    });

    resetAll();
  </script>
</body>
</html>
